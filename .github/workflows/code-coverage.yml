name: code-coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Go environment
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Setup Node.js (for Smoke Engine)
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Clone Upstream Conformance Suite
        run: |
          git clone --depth 1 https://github.com/skyphusion-labs/the-hollow-grid.git upstream-mud
          cd upstream-mud && npm install

      - name: Run Go Unit Tests with Coverage
        run: go test -v -coverprofile=unit.out -covermode=atomic ./...

      - name: Build Instrumented Server Binary
        run: go build -cover -o hollow-grid-server ./cmd/...

      - name: Run E2E Smoke Conformance Suite
        run: |
          mkdir -p docoverage
          export GOCOVERDIR=$(pwd)/docoverage

          ./hollow-grid-server &
          SERVER_PID=$!

          timeout 30s bash -c 'until curl -sf http://localhost:8790/health; do sleep 1; done'

          MUD_URL=ws://localhost:8790/ws timeout 90s node upstream-mud/smoke.mjs || true

          kill -SIGTERM $SERVER_PID || kill -9 $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
          sleep 2

      - name: Process Binary Telemetry
        run: |
          if [ -d docoverage ] && [ "$(ls -A docoverage 2>/dev/null)" ]; then
            go tool covdata textfmt -i=docoverage -o=smoke.out
          else
            echo "mode: atomic" > smoke.out
          fi

      - name: Merge Coverage Matrices
        run: |
          echo "mode: atomic" > coverage.out
          grep -h -v "^mode:" unit.out smoke.out >> coverage.out || true
          test -s coverage.out

      - name: Convert coverage to Cobertura XML
        run: |
          go install github.com/t-yuki/gocover-cobertura@latest
          "$(go env GOPATH)/bin/gocover-cobertura" < coverage.out > coverage.xml
          test -s coverage.xml

      - name: Upload cobertura artifact
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-coverage
          path: coverage.xml
          if-no-files-found: error

  coverage-upload:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      code-quality: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cobertura-coverage
      - name: Upload coverage report
        uses: actions/upload-code-coverage@v1
        with:
          file: ./coverage.xml
          language: go
          label: code-coverage/go
