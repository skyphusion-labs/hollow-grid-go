name: ci

on:
  push:
    branches: [main]
  pull_request:

# Public repo -> GitHub-hosted ubuntu-latest (fork-safe), never the fleet pool.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...
