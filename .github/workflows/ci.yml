name: ci

on:
  push:
    branches: [main]
  pull_request:

# hollow-grid-go is a PRIVATE repo (no outside PRs), so CI runs on the
# org-level self-hosted fleet pool.
jobs:
  build:
    runs-on: [self-hosted, fleet]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go vet ./...
      - run: go build ./...
